<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UI Test</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="src/ui.css">
  <link rel="stylesheet" href="src/icons.css">
  <link rel="stylesheet" href="src/uix.css">
  <link rel="stylesheet" href="src/themes/ocean.css">
  <link rel="stylesheet" href="src/themes/forest.css">
  <link rel="stylesheet" href="src/themes/rose.css">
  <link rel="stylesheet" href="src/themes/metal.css">
  <link rel="stylesheet" href="src/themes/desert.css">
  <link rel="stylesheet" href="src/themes/neptune.css">
  <link rel="stylesheet" href="src/themes/saturn.css">
  <link rel="stylesheet" href="src/themes/jupiter.css">
  <link rel="stylesheet" href="src/themes/mars.css">
  <link rel="stylesheet" href="src/themes/nord.css">
  <link rel="stylesheet" href="src/themes/mercury.css">
  <link rel="stylesheet" href="src/themes/gold.css">
  <link rel="stylesheet" href="src/themes/silver.css">
  <link rel="stylesheet" href="src/themes/copper.css">
  <link rel="stylesheet" href="src/themes/fire.css">
  <link rel="stylesheet" href="src/themes/ice.css">
  <link rel="stylesheet" href="src/themes/glass.css">
  <link rel="stylesheet" href="src/themes/wood.css">
  <link rel="stylesheet" href="src/themes/olive.css">

  <!-- Or toggle via JavaScript -->
  <script>
    document.documentElement.setAttribute('data-ui-theme', 'gold');
    document.documentElement.setAttribute('data-ui-gradient', '');
  </script>
</head>
<body>
<div class="ui-autocomplete sm" id="my-ac-sm">
  <i class="ui-icon ui-icon-search ui-autocomplete-icon"></i>
  <input class="ui-autocomplete-input" type="text" placeholder="Small..." oninput="filterAutocomplete('my-ac-sm')" onfocus="this.closest('.ui-autocomplete').classList.add('open')">
  <button class="ui-autocomplete-clear" type="button" onclick="clearAutocomplete(this)"><i class="ui-icon ui-icon-x"></i></button>
  <div class="ui-autocomplete-menu">
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">Australia</button>
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">Brazil</button>
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">Canada</button>
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">France</button>
    <span class="ui-autocomplete-empty">No results found</span>
  </div>
</div>

<div class="ui-autocomplete" id="my-ac">
  <i class="ui-icon ui-icon-search ui-autocomplete-icon"></i>
  <input class="ui-autocomplete-input" type="text" placeholder="Default..." oninput="filterAutocomplete('my-ac')" onfocus="this.closest('.ui-autocomplete').classList.add('open')">
  <button class="ui-autocomplete-clear" type="button" onclick="clearAutocomplete(this)"><i class="ui-icon ui-icon-x"></i></button>
  <div class="ui-autocomplete-menu">
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">Australia</button>
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">Brazil</button>
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">Canada</button>
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">France</button>
    <span class="ui-autocomplete-empty">No results found</span>
  </div>
</div>

<div class="ui-autocomplete lg" id="my-ac-lg">
  <i class="ui-icon ui-icon-search ui-autocomplete-icon"></i>
  <input class="ui-autocomplete-input" type="text" placeholder="Large..." oninput="filterAutocomplete('my-ac-lg')" onfocus="this.closest('.ui-autocomplete').classList.add('open')">
  <button class="ui-autocomplete-clear" type="button" onclick="clearAutocomplete(this)"><i class="ui-icon ui-icon-x"></i></button>
  <div class="ui-autocomplete-menu">
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">Australia</button>
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">Brazil</button>
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">Canada</button>
    <button class="ui-dropdown-item" onclick="pickAutocomplete(this)">France</button>
    <span class="ui-autocomplete-empty">No results found</span>
  </div>
</div>

<script>
function filterAutocomplete(id) {
  const ac = document.getElementById(id);
  const query = ac.querySelector('.ui-autocomplete-input').value.toLowerCase();
  const items = ac.querySelectorAll('.ui-dropdown-item');
  let visible = 0;
  items.forEach(item => {
    const match = item.textContent.toLowerCase().includes(query);
    item.classList.toggle('hidden', !match);
    if (match) visible++;
  });
  ac.querySelector('.ui-autocomplete-empty').style.display = visible === 0 ? 'block' : 'none';
  ac.classList.toggle('has-value', !!ac.querySelector('.ui-autocomplete-input').value);
  ac.classList.add('open');
}

function pickAutocomplete(btn) {
  const ac = btn.closest('.ui-autocomplete');
  ac.querySelector('.ui-autocomplete-input').value = btn.textContent.trim();
  ac.querySelectorAll('.ui-dropdown-item.focused').forEach(i => i.classList.remove('focused'));
  ac.querySelectorAll('.ui-dropdown-item.selected').forEach(i => i.classList.remove('selected'));
  btn.classList.add('selected');
  ac.classList.remove('open');
  ac.classList.add('has-value');
}

function clearAutocomplete(btn) {
  const ac = btn.closest('.ui-autocomplete');
  const input = ac.querySelector('.ui-autocomplete-input');
  input.value = '';
  ac.classList.remove('has-value');
  ac.querySelectorAll('.ui-dropdown-item').forEach(i => i.classList.remove('hidden', 'focused', 'selected'));
  ac.querySelector('.ui-autocomplete-empty').style.display = 'none';
  ac.classList.remove('open');
}

// Prevent focus loss when clicking menu items or clear button
document.addEventListener('mousedown', e => {
  if (e.target.closest('.ui-autocomplete-menu') || e.target.closest('.ui-autocomplete-clear')) {
    e.preventDefault();
  }
});

// Keyboard navigation
document.addEventListener('keydown', e => {
  const ac = e.target.closest('.ui-autocomplete');
  if (!ac) return;

  if (e.key === 'Escape') {
    ac.querySelector('.ui-autocomplete-input').value = '';
    ac.classList.remove('has-value', 'open');
    ac.querySelectorAll('.ui-dropdown-item').forEach(i => i.classList.remove('hidden', 'focused'));
    ac.querySelector('.ui-autocomplete-empty').style.display = 'none';
    return;
  }

  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    if (!ac.classList.contains('open')) {
      e.preventDefault();
      ac.classList.add('open');
      const selected = ac.querySelector('.ui-dropdown-item.selected');
      if (selected && !selected.classList.contains('hidden')) {
        selected.classList.add('focused');
        selected.scrollIntoView({ block: 'nearest' });
      }
      return;
    }
  } else if (!ac.classList.contains('open')) {
    return;
  }

  const items = [...ac.querySelectorAll('.ui-dropdown-item:not(.hidden)')];
  if (!items.length) return;
  const current = ac.querySelector('.ui-dropdown-item.focused');
  const selected = ac.querySelector('.ui-dropdown-item.selected');
  let idx = current ? items.indexOf(current) : (selected ? items.indexOf(selected) : -1);

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (current) current.classList.remove('focused');
    idx = idx < items.length - 1 ? idx + 1 : 0;
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (current) current.classList.remove('focused');
    idx = idx > 0 ? idx - 1 : items.length - 1;
    items[idx].classList.add('focused');
    items[idx].scrollIntoView({ block: 'nearest' });
  } else if (e.key === 'Enter' && current) {
    e.preventDefault();
    pickAutocomplete(current);
  }
});

// Close on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.ui-autocomplete')) {
    document.querySelectorAll('.ui-autocomplete.open').forEach(ac => ac.classList.remove('open'));
  }
});
</script>
</body>
</html>
