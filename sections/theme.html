  <div class="demo-section" id="theme">
    <h2>Theme Configurator</h2>
    <div class="demo-subsection">
      <h3>Pick colors to live-update the entire page</h3>
      <div class="theme-controls">
        <div class="color-swatch">
          <input type="color" id="cfg-primary" value="#2095f3">
          <label for="cfg-primary">Primary</label>
        </div>
        <div class="color-swatch">
          <input type="color" id="cfg-secondary" value="#8590a2">
          <label for="cfg-secondary">Secondary</label>
        </div>
        <div class="color-swatch">
          <input type="color" id="cfg-success" value="#34c379">
          <label for="cfg-success">Success</label>
        </div>
        <div class="color-swatch">
          <input type="color" id="cfg-danger" value="#f06272">
          <label for="cfg-danger">Danger</label>
        </div>
        <div class="color-swatch">
          <input type="color" id="cfg-warning" value="#f5a623">
          <label for="cfg-warning">Warning</label>
        </div>
        <div class="color-swatch">
          <input type="color" id="cfg-bg" value="#ffffff">
          <label for="cfg-bg">Background</label>
        </div>
        <div class="color-swatch">
          <input type="color" id="cfg-text" value="#1a1d26">
          <label for="cfg-text">Text</label>
        </div>
      </div>
      <div class="ui-row sm">
        <button class="ui-btn sm ghost secondary" onclick="resetTheme()">Reset to defaults</button>
      </div>
    </div>
  </div>
