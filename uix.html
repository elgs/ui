  <style>

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--ui-bg-subtle);
      font-family: var(--ui-font);
      color: var(--ui-text);
    }

    /* Layout */
    .demo-page { display: flex; min-height: 100vh; }
    .demo-sidebar {
      position: sticky; top: 0; width: 13rem; height: 100vh;
      overflow-y: auto; padding: 1.5rem 0 1.5rem 1.25rem; flex-shrink: 0;
      border-right: 1px solid var(--ui-border); background: var(--ui-bg);
    }
    .demo-sidebar-title {
      font-size: 0.875rem; font-weight: 700; margin: 0 0 1rem; padding: 0 0.5rem;
    }
    .demo-nav { display: flex; flex-direction: column; gap: 0.0625rem; }
    .demo-nav a {
      display: block; padding: 0.3125rem 0.5rem; font-size: 0.8125rem;
      color: var(--ui-text-muted); text-decoration: none;
      border-radius: var(--ui-radius-sm); transition: color 0.15s, background 0.15s;
    }
    .demo-nav a:hover { color: var(--ui-text); background: var(--ui-bg-subtle); }
    .demo-nav a.active { color: var(--ui-primary); background: var(--ui-primary-light); font-weight: 500; }
    .demo-nav-divider {
      height: 0; border: none; border-top: 1px solid var(--ui-border); margin: 0.5rem 0.5rem;
    }
    .demo-nav-label {
      font-size: 0.6875rem; font-weight: 700; color: var(--ui-text);
      text-transform: uppercase; letter-spacing: 0.06em; padding: 0.625rem 0.5rem 0.25rem;
    }
    .demo-main { flex: 1; min-width: 0; }
    .demo-layout { max-width: 56rem; margin: 0 auto; padding: 2rem 2.5rem; }
    .demo-menu-toggle {
      display: none;
      position: fixed;
      bottom: 1rem;
      left: 1rem;
      z-index: 1000;
      width: 2.75rem;
      height: 2.75rem;
      border-radius: 50%;
      border: 1px solid var(--ui-border);
      background: var(--ui-bg);
      color: var(--ui-text);
      font-size: 1.25rem;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    @media (max-width: 860px) {
      .demo-menu-toggle { display: flex; }
      .demo-sidebar {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        z-index: 999;
        width: 16rem;
        height: 100vh;
        box-shadow: 2px 0 12px rgba(0,0,0,0.15);

        &.open { display: block; }
      }
      .demo-sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 998;
        background: rgba(0,0,0,0.3);

        &.open { display: block; }
      }
      .demo-layout { padding: 1.5rem 1.25rem; }
    }

    /* Header */
    .demo-header { margin-bottom: 2.5rem; }
    .demo-header h1 { font-size: 1.75rem; font-weight: 700; margin: 0 0 0.25rem; }
    .demo-header p { color: var(--ui-text-muted); margin: 0; font-size: 0.9375rem; }

    /* Sections */
    .demo-section { margin-bottom: 3rem; scroll-margin-top: 1.5rem; }
    .demo-section h2 {
      font-size: 1.125rem; font-weight: 600; margin: 0 0 1.25rem;
      padding-bottom: 0.625rem; border-bottom: 1px solid var(--ui-border);
    }

    /* Cards */
    .demo-card {
      margin-bottom: 1.5rem; padding: 1.25rem;
      background: var(--ui-surface); border: 1px solid var(--ui-border);
      border-radius: var(--ui-radius-lg);
    }
    .demo-card h3 {
      font-size: 0.75rem; font-weight: 500; color: var(--ui-text-muted);
      text-transform: uppercase; letter-spacing: 0.05em; margin: 0 0 0.75rem;
    }

    /* Helpers */
    .flex-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .flex-col { display: flex; flex-direction: column; gap: 0.75rem; }
    .gap-sm { gap: 0.5rem; }
    .gap-lg { gap: 1.25rem; }
    .mt-1 { margin-top: 1rem; }
    .align-start { align-items: flex-start; }
    .max-w-sm { max-width: 14rem; }
    .max-w-md { max-width: 16rem; }

    /* Theme controls (fixed top-right) */
    .theme-controls-fixed {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    #theme-bar {
      & .ui-autocomplete-menu {
        max-height: min(70vh, 36rem);
        overflow-y: auto;
      }

      & .theme-swatch {
        width: 0.75rem;
        height: 0.75rem;
        border-radius: var(--ui-radius-full);
        border: 1px solid var(--ui-border);
        flex-shrink: 0;
      }

      & .ui-dropdown-item.active {
        background: color-mix(in srgb, var(--ui-primary) 10%, transparent);
      }
    }

    .theme-toggle {
      width: 36px;
      height: 36px;
      border-radius: var(--ui-radius-full);
      border: 1px solid var(--ui-primary);
      background: var(--ui-surface);
      color: var(--ui-text);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      transition: background var(--ui-transition), border-color var(--ui-transition);

      &:hover {
        border-color: var(--ui-primary-hover);
      }

    }

    #gradient-toggle {
      border: none;
      background: var(--ui-primary);
      box-shadow: none;

      &:hover {
        opacity: 0.85;
      }
    }

    [data-ui-gradient] #gradient-toggle {

<script>
  // ── Section loader ──
  var uixSectionIds = [
    'input-otp','menu',
    'timeline','stepper','code-block','diff',
    'popover','empty-state','chat-bubble'
  ];

  (async function() {
    // Load all sections in parallel
    var container = document.getElementById('sections-container');
    var htmls = await Promise.all(
      uixSectionIds.map(function(id) { return fetch('uix-sections/' + id + '.html').then(function(r) { return r.text(); }); })
    );
    container.innerHTML = htmls.join('\n');

    // ── Initialize everything now that sections are in the DOM ──

    // Theme bar
    (function() {
      var bar = document.getElementById('theme-bar');
      var input = bar.querySelector('.ui-autocomplete-input');
      var items = bar.querySelectorAll('.ui-dropdown-item');
      var emptyMsg = bar.querySelector('.ui-autocomplete-empty');
      var saved = localStorage.getItem('ui-theme') || '';

      function filterThemes() {
        var query = input.value.toLowerCase();
        var visible = 0;
        items.forEach(function(item) {
          item.classList.remove('focused');
          var match = item.textContent.toLowerCase().includes(query);
          item.classList.toggle('hidden', !match);
          if (match) ++visible;
        });
        emptyMsg.classList.toggle('visible', visible === 0);
        bar.classList.toggle('has-value', !!input.value);
        bar.classList.add('open');
      }

      function selectTheme(name) {
        window.__uiTheme.setTheme(name);
        items.forEach(function(item) {
          item.classList.toggle('active', item.dataset.theme === (name || ''));
        });
        input.value = name ? name.charAt(0).toUpperCase() + name.slice(1) : 'Default';
        bar.classList.toggle('has-value', !!name);
        items.forEach(function(item) { item.classList.remove('hidden', 'focused'); });
        emptyMsg.classList.remove('visible');
        bar.classList.remove('open');
      }

      input.addEventListener('input', filterThemes);
      input.addEventListener('focus', function() { input.value = ''; bar.classList.add('open'); });

      items.forEach(function(item) {
        item.addEventListener('click', function() { selectTheme(item.dataset.theme); });
      });

      bar.querySelector('.ui-autocomplete-clear').addEventListener('click', function() { selectTheme(''); });

      if (saved) {
        input.value = saved.charAt(0).toUpperCase() + saved.slice(1);
        bar.classList.add('has-value');
        items.forEach(function(item) {
          item.classList.toggle('active', item.dataset.theme === saved);
        });
      }

      // Keyboard navigation
      input.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          items.forEach(function(item) { item.classList.remove('focused', 'hidden'); });
          input.value = '';
          bar.classList.remove('has-value', 'open');
          emptyMsg.classList.remove('visible');
          return;
        }

        if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
          if (!bar.classList.contains('open')) {
            e.preventDefault();
            bar.classList.add('open');
            var active = bar.querySelector('.ui-dropdown-item.active');
            if (active && !active.classList.contains('hidden')) {
              active.classList.add('focused');
              active.scrollIntoView({ block: 'nearest' });
            }
            return;
          }
        } else if (!bar.classList.contains('open')) {
          return;
        }
        var visible = Array.from(bar.querySelectorAll('.ui-dropdown-item:not(.hidden)'));
        if (!visible.length) return;
        var current = bar.querySelector('.ui-dropdown-item.focused');
        var active = bar.querySelector('.ui-dropdown-item.active');
        var idx = current ? visible.indexOf(current) : (active ? visible.indexOf(active) : -1);

        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (current) current.classList.remove('focused');
          idx = idx < visible.length - 1 ? idx + 1 : 0;
          visible[idx].classList.add('focused');
          visible[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (current) current.classList.remove('focused');
          idx = idx > 0 ? idx - 1 : visible.length - 1;
          visible[idx].classList.add('focused');
          visible[idx].scrollIntoView({ block: 'nearest' });
        } else if (e.key === 'Enter') {
          e.preventDefault();
          if (current) selectTheme(current.dataset.theme);
        }
      });

      // Prevent focus loss when clicking inside menu or clear button
      bar.addEventListener('mousedown', function(e) {
        if (e.target.closest('.ui-autocomplete-menu') || e.target.closest('.ui-autocomplete-clear')) {
          e.preventDefault();
        }
      });

      // Close when clicking outside
      document.addEventListener('click', function(e) {
        if (!bar.contains(e.target)) {
          bar.classList.remove('open');
          var t = localStorage.getItem('ui-theme') || '';
          input.value = t ? t.charAt(0).toUpperCase() + t.slice(1) : '';
          bar.classList.toggle('has-value', !!t);
          items.forEach(function(item) { item.classList.remove('hidden', 'focused'); });
          emptyMsg.classList.remove('visible');
        }
      });
    })();

    // Gradient toggle
    (function() {
      var btn = document.getElementById('gradient-toggle');
      if (localStorage.getItem('ui-gradient') === '1') {
        document.documentElement.setAttribute('data-ui-gradient', '');
      }
      btn.addEventListener('click', function() {
        var on = document.documentElement.toggleAttribute('data-ui-gradient');
        localStorage.setItem('ui-gradient', on ? '1' : '0');
      });
    })();

    // ── Syntax highlighting & live editor ──

    var _esc = function(s) {
      return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    };

    function _hlJS(code) {
      return code.replace(
        /(\/\/[^\n]*|\/\*[\s\S]*?\*\/)|('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|`(?:[^`\\]|\\.)*`)|(\b(?:var|let|const|function|return|if|else|for|while|new|this|class|import|export|from|of|in|typeof|instanceof|null|undefined|true|false)\b)|(\b\d+(?:\.\d+)?\b)|(\.(?:forEach|querySelector|querySelectorAll|addEventListener|classList|toggle|remove|contains|closest|parentElement|target)\b)|(\=\>)/g,
        function(m, cmt, str, kw, num, prop, arrow) {
          if (cmt) return '<span class="hl-cmt">' + _esc(cmt) + '</span>';
          if (str) return '<span class="hl-js-str">' + _esc(str) + '</span>';
          if (kw) return '<span class="hl-key">' + _esc(kw) + '</span>';
          if (num) return '<span class="hl-num">' + _esc(num) + '</span>';
          if (prop) return '<span class="hl-prop">' + _esc(prop) + '</span>';
          if (arrow) return '<span class="hl-op">' + _esc(arrow) + '</span>';
          return _esc(m);
        }
      );
    }

    function highlightHTML(raw) {
      var out = '', i = 0;
      while (i < raw.length) {
        if (raw.startsWith('<!--', i)) {
          var end = raw.indexOf('-->', i + 4);
          var j = end < 0 ? raw.length : end + 3;
          out += '<span class="hl-cmt">' + _esc(raw.slice(i, j)) + '</span>';
          i = j;
        } else if (raw.startsWith('<script', i)) {
          var closeTag = raw.indexOf('>', i);
          if (closeTag < 0) { out += _esc(raw.slice(i)); break; }
          out += _hlTag(raw.slice(i, closeTag + 1));
          var endTag = '<' + '/script>';
          var scriptEnd = raw.indexOf(endTag, closeTag + 1);
          if (scriptEnd < 0) {
            out += _hlJS(raw.slice(closeTag + 1));
            break;
          }
          out += _hlJS(raw.slice(closeTag + 1, scriptEnd));
          out += _hlTag(endTag);
          i = scriptEnd + endTag.length;
        } else if (raw[i] === '<') {
          var end = raw.indexOf('>', i);
          var j = end < 0 ? raw.length : end + 1;
          out += _hlTag(raw.slice(i, j));
          i = j;
        } else {
          var next = raw.indexOf('<', i);
          var j = next < 0 ? raw.length : next;
          out += _esc(raw.slice(i, j));
          i = j;
        }
      }
      return out;
    }

    function _hlTag(tag) {
      var m = tag.match(/^(<\/?)(\w[\w-]*)([^]*?)(\/?>)$/s);
      if (!m) return _esc(tag);
      var r = '<span class="hl-bkt">' + _esc(m[1]) + '</span>';
      r += '<span class="hl-tag">' + _esc(m[2]) + '</span>';
      r += m[3].replace(/([\w-:]+)(\s*=\s*"([^"]*)")?/g, function(_, name, eq, val) {
        var s = '<span class="hl-atn">' + _esc(name) + '</span>';
        if (eq !== undefined) s += '=<span class="hl-atv">"' + _esc(val) + '"</span>';
        return s;
      });
      r += '<span class="hl-bkt">' + _esc(m[4]) + '</span>';
      return r;
    }

    function _saveCursor(el) {
      var sel = window.getSelection();
      if (!sel.rangeCount) return 0;
      var range = sel.getRangeAt(0);
      var pre = range.cloneRange();
      pre.selectNodeContents(el);
      pre.setEnd(range.startContainer, range.startOffset);
      return pre.toString().length;
    }

    function _restoreCursor(el, offset) {
      var range = document.createRange();
      var sel = window.getSelection();
      var cur = 0;
      var walk = document.createTreeWalker(el, NodeFilter.SHOW_TEXT);
      var node;
      while (node = walk.nextNode()) {
        if (cur + node.length >= offset) {
          range.setStart(node, offset - cur);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
          return;
        }
        cur += node.length;
      }
      range.selectNodeContents(el);
      range.collapse(false);
      sel.removeAllRanges();
      sel.addRange(range);
    }

    function _sanitize(html) {
      return html
        .replace(/<script[\s\S]*?<\/script>/gi, '')
        .replace(/<style[\s\S]*?<\/style>/gi, '')
        .replace(/<link[^>]*>/gi, '')
        .replace(/<!--[\s\S]*?-->/g, '');
    }

    // Auto-generate line number spans
    function initLineNumbers(root) {
      (root || document).querySelectorAll('.ui-code.line-numbers').forEach(function(block) {
        var code = block.querySelector('pre code');
        var col = block.querySelector('.line-numbers-col');
        if (!code || !col) return;
        var count = code.textContent.split('\n').length;
        col.innerHTML = '<span></span>'.repeat(count);
      });
    }
    initLineNumbers();

    // Initialize all code blocks
    document.querySelectorAll('.demo-code pre').forEach(function(pre) {
      var raw = pre.textContent;

      // Move copy button inside <pre> so it positions relative to the code area
      var copyBtn = pre.parentElement.querySelector('.copy-btn');
      if (copyBtn) pre.appendChild(copyBtn);

      function getCodeText() {
        if (copyBtn) copyBtn.remove();
        var t = pre.textContent.replace(/\u200b/g, '');
        if (copyBtn) pre.appendChild(copyBtn);
        return t;
      }

      var details = pre.closest('.demo-code');
      var liveTargetId = details && details.getAttribute('data-live-target');

      // Make editable with syntax highlighting
      pre.contentEditable = 'true';
      pre.spellcheck = false;
      pre.innerHTML = highlightHTML(raw);
      if (copyBtn) pre.appendChild(copyBtn);

      // Manual undo/redo stack
      var undoStack = [{ text: raw, cursor: 0 }];
      var undoIdx = 0;

      function updateDemo(text) {
        if (liveTargetId) {
          var el = document.getElementById(liveTargetId);
          if (el) {
            el.innerHTML = _sanitize(text);
            initLineNumbers(el);
          }
        }
      }

      function setContent(entry) {
        pre.innerHTML = highlightHTML(entry.text);
        if (copyBtn) pre.appendChild(copyBtn);
        _restoreCursor(pre, entry.cursor);
        updateDemo(entry.text);
      }

      // Debounced re-highlight
      var hlTimer = null;
      function scheduleHighlight() {
        clearTimeout(hlTimer);
        hlTimer = setTimeout(function() {
          var text = getCodeText();
          var pos = _saveCursor(pre);
          pre.innerHTML = highlightHTML(text);
          if (copyBtn) pre.appendChild(copyBtn);
          _restoreCursor(pre, pos);
        }, 500);
      }

      pre.addEventListener('input', function() {
        var text = getCodeText();
        var cursor = _saveCursor(pre);
        ++undoIdx;
        undoStack.length = undoIdx;
        undoStack.push({ text: text, cursor: cursor });
        updateDemo(text);
        scheduleHighlight();
      });

      // Paste as plain text
      pre.addEventListener('paste', function(e) {
        e.preventDefault();
        var text = e.clipboardData.getData('text/plain');
        var sel = window.getSelection();
        if (!sel.rangeCount) return;
        var range = sel.getRangeAt(0);
        range.deleteContents();
        range.insertNode(document.createTextNode(text));
        range.collapse(false);
        sel.removeAllRanges();
        sel.addRange(range);
        pre.dispatchEvent(new Event('input', { bubbles: true }));
      });

      // Keyboard handling
      pre.addEventListener('keydown', function(e) {
        if (e.key === 'Tab') {
          e.preventDefault();
          var sel = window.getSelection();
          if (!sel.rangeCount) return;
          var range = sel.getRangeAt(0);
          range.deleteContents();
          range.insertNode(document.createTextNode('  '));
          range.collapse(false);
          sel.removeAllRanges();
          sel.addRange(range);
          pre.dispatchEvent(new Event('input', { bubbles: true }));
        } else if (e.key === 'Enter') {
          e.preventDefault();
          var sel = window.getSelection();
          if (!sel.rangeCount) return;
          var range = sel.getRangeAt(0);
          range.deleteContents();
          var nl = document.createTextNode('\n\u200b');
          range.insertNode(nl);
          range.setStart(nl, 1);
          range.collapse(true);
          sel.removeAllRanges();
          sel.addRange(range);
          pre.dispatchEvent(new Event('input', { bubbles: true }));
        } else if ((e.metaKey || e.ctrlKey) && e.key === 'z') {
          e.preventDefault();
          if (e.shiftKey) {
            if (undoIdx < undoStack.length - 1) {
              ++undoIdx;
              setContent(undoStack[undoIdx]);
            }
          } else {
            if (undoIdx > 0) {
              --undoIdx;
              setContent(undoStack[undoIdx]);
            }
          }
        }
      });
    });

    // Menu group toggle (event delegation survives innerHTML updates)
    document.addEventListener('click', function(e) {
      var toggle = e.target.closest('.ui-menu-group-toggle');
      if (toggle) toggle.closest('.ui-menu-group').classList.toggle('collapsed');
    });

    // Popover toggle & dismiss (event delegation survives innerHTML updates)
    var popoverTarget = document.getElementById('live-popover-pos');
    if (popoverTarget) {
      popoverTarget.addEventListener('click', function(e) {
        var popover = e.target.closest('.ui-popover');
        if (popover) popover.classList.toggle('open');
      });
    }
    document.addEventListener('click', function(e) {
      document.querySelectorAll('.ui-popover.open').forEach(function(p) {
        if (!p.contains(e.target)) p.classList.remove('open');
      });
    });

    // Scroll spy for sidebar nav
    var navLinks = document.querySelectorAll('.demo-nav a[href^="#"]');
    var sections = [].map.call(navLinks, function(a) {
      return document.getElementById(a.getAttribute('href').slice(1));
    }).filter(Boolean);

    function updateActiveNav() {
      var current = '';
      for (var i = 0; i < sections.length; ++i) {
        if (sections[i].getBoundingClientRect().top <= 100) {
          current = sections[i].id;
        }
      }
      navLinks.forEach(function(a) {
        a.classList.toggle('active', a.getAttribute('href') === '#' + current);
      });
    }
    window.addEventListener('scroll', updateActiveNav, { passive: true });
    updateActiveNav();

    // Smooth scroll for nav links
    navLinks.forEach(function(a) {
      a.addEventListener('click', function(e) {
        e.preventDefault();
        var target = document.getElementById(a.getAttribute('href').slice(1));
        if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      });
    });

    // CSS syntax highlighter
    function highlightCSS(text) {
      var esc = function(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };
      return text.replace(
        /(\/\*[\s\S]*?\*\/)|("[^"]*"|'[^']*')|([@][\w-]+)|([{};])|(:)((?:[^;{}\/]|\/(?!\*))*)(;)|([\w.#&:>\[\]=~*^|$@()-]+(?:\s*,\s*[\w.#&:>\[\]=~*^|$()-]+)*)\s*(?=\{)/g,
        function(m, comment, str, atRule, brace, colon, value, semi, selector) {
          if (comment) return '<span class="hl-cmt">' + esc(comment) + '</span>';
          if (str) return '<span class="hl-str">' + esc(str) + '</span>';
          if (atRule) return '<span class="hl-at">' + esc(atRule) + '</span>';
          if (brace) return '<span class="hl-brace">' + esc(brace) + '</span>';
          if (colon && value !== undefined) {
            var highlighted = esc(value).replace(
              /(-?[\d.]+)(rem|px|em|%|vh|vw|ms|s|deg|fr)\b/g,
              '$1<span class="hl-unit">$2</span>'
            );
            return '<span class="hl-brace">:</span><span class="hl-val">' + highlighted + '</span><span class="hl-brace">;</span>';
          }
          if (selector) return '<span class="hl-sel">' + esc(selector) + '</span>';
          return esc(m);
        }
      );
    }

    // View uix.css source dialog
    var sourceCssCache = null;
    window.openSourceDialog = function() {
      var dialog = document.getElementById('source-dialog');
      dialog.showModal();
      if (sourceCssCache) {
        document.getElementById('source-pre').innerHTML = highlightCSS(sourceCssCache);
      } else {
        fetch('src/uix.css')
          .then(function(r) { return r.text(); })
          .then(function(css) {
            sourceCssCache = css;
            document.getElementById('source-pre').innerHTML = highlightCSS(css);
          })
          .catch(function() {
            document.getElementById('source-pre').textContent = 'Failed to load uix.css';
          });
      }
    };

    // Source dialog: close on backdrop click
    document.getElementById('source-dialog').addEventListener('click', function(e) {
      var d = e.currentTarget;
      var rect = d.getBoundingClientRect();
      if (e.clientX < rect.left || e.clientX > rect.right ||
          e.clientY < rect.top || e.clientY > rect.bottom) {
        d.close();
      }
    });

    // Scroll to hash if present
    if (location.hash) {
      var target = document.getElementById(location.hash.slice(1));
      if (target) target.scrollIntoView({ block: 'start' });
    }
  })();
</script>
<script>
  (function() {
    var toggle = document.getElementById('menu-toggle');
    var sidebar = document.getElementById('demo-sidebar');
    var overlay = document.getElementById('sidebar-overlay');
    function open() { sidebar.classList.add('open'); overlay.classList.add('open'); }
    function close() { sidebar.classList.remove('open'); overlay.classList.remove('open'); }
    toggle.addEventListener('click', function() { sidebar.classList.contains('open') ? close() : open(); });
    overlay.addEventListener('click', close);
    sidebar.addEventListener('click', function(e) { if (e.target.tagName === 'A') close(); });
  })();
</script>

</body>
</html>
